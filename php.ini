; PHP configuration for Railway production deployment
; Enables output buffering to prevent "headers already sent" errors

[PHP]
; Buffer all output so headers can always be sent before body content
output_buffering = On

; Increase memory limit for Laravel
memory_limit = 256M

; Increase upload limits
upload_max_filesize = 10M
post_max_size = 12M

; Increase max execution time
max_execution_time = 60

; Disable display_errors in production (use log instead)
display_errors = Off
display_startup_errors = Off
log_errors = On

; Timezone
date.timezone = UTC

; Session settings
session.gc_maxlifetime = 7200
